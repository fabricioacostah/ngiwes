name: Compilar Buscador de Senas para Windows

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: 2. Configurar Python en la maquina virtual
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 3. Instalar librerias del proyecto
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python mediapipe pillow pyinstaller

    - name: 4. Compilar vinculando explicitamente MediaPipe
      run: |
        python -m PyInstaller --onefile --windowed --hidden-import="mediapipe.solutions" --hidden-import="mediapipe.solutions.hands" --collect-all mediapipe "analizador copy.py"
        xcopy /E /I /Y assets dist\assets

    - name: 5. Guardar y publicar el paquete final
      uses: actions/upload-artifact@v4
      with:
        name: Traductor-Windows-EXE
        path: dist/
