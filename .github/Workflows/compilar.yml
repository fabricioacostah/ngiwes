name: Compilar Buscador de Señas para Windows

on:
  push:
    branches: [ main, master ] # Se ejecutará automáticamente cuando subas cambios
  workflow_dispatch: # Esto te permite activar la compilación manualmente desde la web de GitHub

jobs:
  build:
    runs-on: windows-latest # Aquí ocurre la magia: GitHub levanta una máquina Windows real

    steps:
    - name: 1. Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: 2. Configurar Python en la máquina virtual
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip' # Acelera futuras compilaciones

    - name: 3. Instalar librerías del proyecto
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python mediapipe pillow pyinstaller

    - name: 4. Compilar el archivo .exe con PyInstaller
      run: |
        python -m PyInstaller --onefile --windowed --add-data "assets;assets" --collect-all mediapipe "analizador copy.py"

    - name: 5. Guardar y publicar el ejecutable final
      uses: actions/upload-artifact@v4
      with:
        name: Traductor-Windows-EXE
        path: dist/analizador copy.exe