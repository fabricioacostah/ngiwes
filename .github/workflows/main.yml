name: Compilar Buscador de Senas para Windows

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: 2. Configurar Python (64-bit)
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        architecture: 'x64'

    - name: 3. Instalar librerias del proyecto
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python mediapipe pillow pyinstaller setuptools

    - name: 4. Compilar asignando un nombre de carpeta limpio
      run: |
        python -m PyInstaller --onedir --windowed --name "BuscadorSenas" --collect-all mediapipe "analizador copy.py"
        xcopy /E /I /Y assets dist\BuscadorSenas\assets

    - name: 5. Guardar y publicar la carpeta final
      uses: actions/upload-artifact@v4
      with:
        name: Traductor-Windows-EXE
        path: dist/BuscadorSenas/
